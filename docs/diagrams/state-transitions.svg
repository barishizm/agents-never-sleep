<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="'JetBrains Mono', ui-monospace, monospace" role="img" aria-labelledby="t d">
  <title id="t">ANS ticket state transitions — the seven durable outcome states</title>
  <desc id="d">From a ticket, the decision is PROCEED or PARK. A PARK records PARKED_DECISION or PARKED_FOUNDATIONAL. A PROCEED is implemented and gated: a green gate records DONE, or DONE_LOW_CONFIDENCE when a delegated high-risk review was degraded. A gate failure introduced by the diff reverts and records FAILED_RETRYABLE. An environment block records BLOCKED_ENV. A harness or agent fault records FAILED_BUG_IN_AGENT. The four done/parked states are skipped on resume.</desc>
  <rect width="760" height="420" fill="#0b1220"/>
  <text x="380" y="30" fill="#e2e8f0" font-size="17" text-anchor="middle">Seven durable outcome states (one per ticket)</text>

  <defs>
    <marker id="s2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>

  <!-- ticket -->
  <rect x="330" y="56" width="100" height="40" rx="8" fill="#11182a" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="81" fill="#e2e8f0" font-size="12" text-anchor="middle">ticket</text>

  <!-- decide node -->
  <rect x="320" y="128" width="120" height="36" rx="6" fill="#0e1730" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="380" y="151" fill="#22d3ee" font-size="12" text-anchor="middle">decide</text>

  <!-- PROCEED gate node -->
  <rect x="540" y="128" width="120" height="36" rx="6" fill="#0e1730" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="600" y="151" fill="#22d3ee" font-size="12" text-anchor="middle">PROCEED → gate</text>

  <line x1="380" y1="96" x2="380" y2="124" stroke="#64748b" stroke-width="1.5" marker-end="url(#s2)"/>
  <line x1="440" y1="146" x2="536" y2="146" stroke="#64748b" stroke-width="1.5" marker-end="url(#s2)"/>
  <text x="488" y="138" fill="#64748b" font-size="9" text-anchor="middle">low blast-radius</text>

  <!-- PARK outcomes (left) -->
  <line x1="320" y1="150" x2="220" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#s2)"/>
  <text x="240" y="172" fill="#64748b" font-size="9" text-anchor="middle">PARK</text>
  <rect x="60" y="204" width="230" height="34" rx="6" fill="#1a1530" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="175" y="226" fill="#fbbf24" font-size="11" text-anchor="middle">PARKED_DECISION</text>
  <rect x="60" y="248" width="230" height="34" rx="6" fill="#1a1530" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="175" y="270" fill="#fbbf24" font-size="11" text-anchor="middle">PARKED_FOUNDATIONAL</text>
  <text x="175" y="300" fill="#94a3b8" font-size="9" text-anchor="middle">(quarantines dependents)</text>

  <!-- gate outcomes (right) -->
  <rect x="470" y="204" width="250" height="34" rx="6" fill="#0f2018" stroke="#34d399" stroke-width="1.5"/>
  <text x="595" y="226" fill="#34d399" font-size="11" text-anchor="middle">DONE  (gate green)</text>
  <rect x="470" y="248" width="250" height="34" rx="6" fill="#0f2018" stroke="#34d399" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="595" y="270" fill="#a7f3d0" font-size="11" text-anchor="middle">DONE_LOW_CONFIDENCE</text>
  <text x="595" y="296" fill="#94a3b8" font-size="9" text-anchor="middle">(delegated review degraded → daylight)</text>

  <rect x="470" y="316" width="250" height="30" rx="6" fill="#2a1414" stroke="#f87171" stroke-width="1.5"/>
  <text x="595" y="336" fill="#f87171" font-size="11" text-anchor="middle">FAILED_RETRYABLE (revert)</text>

  <line x1="600" y1="164" x2="595" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#s2)"/>
  <line x1="640" y1="164" x2="660" y2="312" stroke="#64748b" stroke-width="1.2" marker-end="url(#s2)"/>
  <text x="690" y="250" fill="#64748b" font-size="9" text-anchor="middle">diff-red</text>

  <!-- env / bug (bottom-left) -->
  <rect x="60" y="330" width="180" height="30" rx="6" fill="#16202e" stroke="#60a5fa" stroke-width="1.3"/>
  <text x="150" y="350" fill="#93c5fd" font-size="11" text-anchor="middle">BLOCKED_ENV</text>
  <rect x="260" y="330" width="180" height="30" rx="6" fill="#2a1414" stroke="#f87171" stroke-width="1.3"/>
  <text x="350" y="350" fill="#f87171" font-size="10" text-anchor="middle">FAILED_BUG_IN_AGENT</text>

  <text x="380" y="396" fill="#475569" font-size="10" text-anchor="middle">DONE · DONE_LOW_CONFIDENCE · PARKED_* are terminal-skip on resume; failed/blocked are re-schedulable under the attempt cap.</text>
</svg>
