<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="'JetBrains Mono', ui-monospace, monospace" role="img" aria-labelledby="t d">
  <title id="t">Blast radius — the PROCEED versus Hard-PARK dial</title>
  <desc id="d">Decisions are tiered by how far a wrong choice can spread. Low blast-radius and reversible decisions like naming, internal structure, and test fixtures are PROCEED. High blast-radius categories — database schema or migration, public API contract, security or tenant boundary, money or billing, and cross-ticket interfaces — are Hard-PARK and never guessed. Because classification can be wrong, reversibility is the backstop: every PROCEED is snapshotted so a wrong assumption is a daylight revert.</desc>
  <rect width="760" height="380" fill="#0b1220"/>
  <text x="380" y="30" fill="#e2e8f0" font-size="17" text-anchor="middle">Blast radius — make "unsure" rare, make "wrong" cheap</text>

  <!-- gradient bar -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#f87171"/>
    </linearGradient>
    <marker id="b2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>
  <rect x="60" y="70" width="640" height="14" rx="7" fill="url(#grad)"/>
  <text x="80" y="104" fill="#22d3ee" font-size="11" text-anchor="start">low blast-radius</text>
  <text x="680" y="104" fill="#f87171" font-size="11" text-anchor="end">high blast-radius</text>

  <!-- PROCEED side -->
  <rect x="60" y="120" width="300" height="120" rx="10" fill="#0e1730" stroke="#22d3ee" stroke-width="2"/>
  <text x="210" y="146" fill="#22d3ee" font-size="13" text-anchor="middle">PROCEED (assume + log)</text>
  <text x="210" y="170" fill="#cbd5e1" font-size="11" text-anchor="middle">naming · internal structure</text>
  <text x="210" y="190" fill="#cbd5e1" font-size="11" text-anchor="middle">log/comment wording</text>
  <text x="210" y="210" fill="#cbd5e1" font-size="11" text-anchor="middle">test fixtures</text>
  <text x="210" y="230" fill="#94a3b8" font-size="10" text-anchor="middle">low + reversible → committed, revertible</text>

  <!-- PARK side -->
  <rect x="400" y="120" width="300" height="120" rx="10" fill="#1a1530" stroke="#fbbf24" stroke-width="2"/>
  <text x="550" y="146" fill="#fbbf24" font-size="13" text-anchor="middle">Hard-PARK (never guess)</text>
  <text x="550" y="168" fill="#cbd5e1" font-size="11" text-anchor="middle">DB schema / migration</text>
  <text x="550" y="186" fill="#cbd5e1" font-size="11" text-anchor="middle">public API contract</text>
  <text x="550" y="204" fill="#cbd5e1" font-size="11" text-anchor="middle">security / tenant boundary</text>
  <text x="550" y="222" fill="#cbd5e1" font-size="11" text-anchor="middle">money / billing · cross-ticket interface</text>

  <rect x="120" y="270" width="520" height="80" rx="8" fill="#0b1426" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="294" fill="#cbd5e1" font-size="11" text-anchor="middle">classification reads ticket text → it is the weakest link</text>
  <text x="380" y="316" fill="#34d399" font-size="11" text-anchor="middle">backstop = reversibility: every PROCEED is git-snapshotted before the edit</text>
  <text x="380" y="336" fill="#94a3b8" font-size="10" text-anchor="middle">a wrong assumption is a daylight revert, not a catastrophe — and disposition re-routes from the real diff</text>
</svg>
