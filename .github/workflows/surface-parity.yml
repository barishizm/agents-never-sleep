# SECURITY: all attacker-controlled values (PR body, labels) reach the shell ONLY through
# `env:` mappings and are referenced as "$VAR" — NEVER interpolated as ${{ ... }} into a
# run: script (that is the GitHub Actions script-injection sink). BASE/HEAD are commit SHAs.
name: surface-parity
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Redaction lint (SSOT public-safe)
        run: python3 site-src/tools/redact_lint.py
      - name: Surface-parity gate
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          CHANGELOG_DIFF="$(git diff "$BASE" "$HEAD" -- CHANGELOG.md || true)" \
          CHANGED_PATHS="$(git diff --name-only "$BASE" "$HEAD")" \
          SURFACE_WAIVER="$(printf '%s' "$PR_BODY" | sed -n 's/^surface-waiver:[[:space:]]*//p' | head -1)" \
          python3 site-src/tools/gate_check.py
