# Public-surface content gate: runs the self-contained redaction lint (scripts/redact_lint.sh)
# on every push/PR and fails if any unambiguously-internal token reaches a tracked file.
# No attacker-controlled value (PR body/labels) is interpolated into a run: script.
name: surface-parity
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Redaction lint (public-surface content gate, self-contained)
        run: bash scripts/redact_lint.sh
